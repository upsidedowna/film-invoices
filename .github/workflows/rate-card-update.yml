name: Rate Card Update

on:
  schedule:
    # Runs February 1 and August 1 at 9:17am UTC each year
    - cron: '17 9 1 2 *'
    - cron: '17 9 1 8 *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (research only, no commit/deploy)'
        type: boolean
        default: false

jobs:
  update-rates:
    name: Research & update production rates
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Run rate research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-rates.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet rate-card.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated rate card
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          git config user.name  "Atlas Rate Bot"
          git config user.email "atlas-rate-bot@users.noreply.github.com"
          git add rate-card.json
          git commit -m "chore: bi-annual rate card update $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Vercel
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_RXa7wnXA0XtJwxs67ll0FpZA
          VERCEL_PROJECT_ID: prj_JPWvnBxj7CIwdaKAVDvYCpJgcuPD
        run: npx vercel --prod --token=$VERCEL_TOKEN --yes

      - name: Log summary
        run: |
          echo "## Rate Card Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "Status: ✅ Rates updated and deployed" >> $GITHUB_STEP_SUMMARY
            git show --stat HEAD 2>/dev/null || echo "Changes committed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: ✅ Rates reviewed — no changes needed" >> $GITHUB_STEP_SUMMARY
          fi
