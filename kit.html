<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=kit-builder.html">
<title>Kit Builder — Invoice Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --ink: #0A0E1A;
  --ink-muted: #4A5568;
  --accent: #1E3A5F;
  --accent-soft: #3A5A85;
  --highlight-soft: rgba(212, 184, 150, 0.35);
  --border: #D8D4CA;
  --bg-soft: #EDEAE3;
  --danger: #8B1E1E;
  --font-body: 'Inter', -apple-system, system-ui, sans-serif;
  --font-display: 'DM Serif Display', Georgia, serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); font-size: 14px; background: var(--bg); color: var(--ink); line-height: 1.5; }

/* ── Header ── */
.kit-header {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.back-link {
  text-decoration: none; color: var(--ink-muted); font-size: 13px;
  display: flex; align-items: center; gap: 4px; white-space: nowrap;
}
.back-link:hover { color: var(--accent); }
.kit-header-title {
  font-family: var(--font-display); font-size: 1.35rem;
  margin: 0; font-weight: 400; letter-spacing: -0.02em; flex: 1;
}
.kit-stats { font-size: 12px; color: var(--ink-muted); white-space: nowrap; }

/* ── Buttons ── */
.btn {
  background: #fff; border: 1px solid var(--border);
  padding: 7px 14px; border-radius: 6px; cursor: pointer;
  font: inherit; font-size: 13px; white-space: nowrap;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg-soft); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-soft); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-danger { background: rgba(139,30,30,.06); border-color: rgba(139,30,30,.25); color: var(--danger); }
.btn-danger:hover { background: rgba(139,30,30,.12); }

/* ── Main layout ── */
.kit-main { max-width: 940px; margin: 0 auto; padding: 24px 24px 100px; }

/* ── Category filter tabs ── */
.cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
.cat-tab {
  padding: 5px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; font-size: 12px; font-weight: 500; color: var(--ink-muted);
  transition: all 0.15s;
}
.cat-tab:hover { border-color: var(--accent-soft); color: var(--accent); }
.cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.cat-tab .ct-count { font-size: 10px; opacity: 0.7; margin-left: 3px; }

/* ── Category sections ── */
.cat-section { margin-bottom: 30px; }
.cat-section-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 2px solid var(--accent);
}
.cat-section-head h3 {
  margin: 0; font-family: var(--font-display); font-size: 1.05rem;
  font-weight: 400; letter-spacing: -0.01em; color: var(--accent);
}
.cat-section-head .cat-count { font-size: 11px; color: var(--ink-muted); margin-left: auto; }
.cat-section-head .add-to-cat-btn { margin-left: 8px; }

/* ── Kit row ── */
.kit-items { display: flex; flex-direction: column; gap: 4px; }
.kit-row {
  display: grid;
  grid-template-columns: 110px 1fr 52px 80px 0.43fr 30px 30px;
  gap: 6px; align-items: center;
}
.kit-row input, .kit-row select {
  padding: 6px 8px; border: 1px solid var(--border); border-radius: 5px;
  font: inherit; font-size: 13px; background: #fff; color: var(--ink);
  min-width: 0; transition: border-color 0.15s;
}
.kit-row input:focus, .kit-row select:focus {
  outline: none; border-color: var(--accent-soft);
  box-shadow: 0 0 0 3px rgba(30,58,95,0.1);
}
.kit-row .rate-input { font-variant-numeric: tabular-nums; }
.kit-row .dup-btn, .kit-row .rm-btn {
  border-radius: 5px; cursor: pointer; font-size: 14px;
  padding: 4px 0; display: flex; align-items: center; justify-content: center;
}
.kit-row .dup-btn {
  background: var(--bg-soft); border: 1px solid var(--border); color: var(--ink-muted);
}
.kit-row .dup-btn:hover { color: var(--accent); border-color: var(--accent-soft); }
.kit-row .rm-btn {
  background: rgba(139,30,30,.06); border: 1px solid rgba(139,30,30,.2); color: var(--danger);
}
.kit-row .rm-btn:hover { background: rgba(139,30,30,.13); }

/* ── Column header labels ── */
.kit-col-labels {
  display: grid;
  grid-template-columns: 110px 1fr 52px 80px 0.43fr 30px 30px;
  gap: 6px; margin-bottom: 6px;
}
.kit-col-labels span {
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-muted); padding: 0 2px;
}

/* ── Action bar ── */
.action-bar {
  background: #fff; border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; margin-bottom: 22px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.action-bar-label {
  width: 100%; font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--ink-muted); margin-bottom: 2px;
}

/* ── Bulk loaders ── */
.bulk-section {
  background: #fff; border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 24px;
}
.bulk-section-head {
  font-family: var(--font-display); font-size: 1rem; font-weight: 400;
  letter-spacing: -0.01em; color: var(--ink); margin-bottom: 10px;
}
.bulk-btns { display: flex; flex-wrap: wrap; gap: 6px; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 56px 24px; }
.empty-state h2 { font-family: var(--font-display); font-size: 1.3rem; color: var(--ink); margin: 0 0 8px; }
.empty-state p { font-size: 13px; color: var(--ink-muted); margin: 0 0 20px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1a1a1a; color: #fff;
  padding: 10px 18px; border-radius: 8px; font-size: 13px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s; z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .kit-row { grid-template-columns: 90px 1fr 44px 70px 0.36fr 30px 30px; }
  .kit-col-labels { grid-template-columns: 90px 1fr 44px 70px 0.36fr 30px 30px; }
  .kit-main { padding: 16px 14px 100px; }
  .kit-header { padding: 10px 14px; }
}
</style>
</head>
<body>

<header class="kit-header">
  <a href="index.html" class="back-link">← Invoice Generator</a>
  <h1 class="kit-header-title">Kit Catalog</h1>
  <span class="kit-stats" id="kit-stats"></span>
  <button class="btn btn-sm" id="add-item-btn">+ Add Item</button>
  <button class="btn btn-sm btn-primary" id="save-btn">💾 Save Kit</button>
</header>

<main class="kit-main">
  <div class="cat-tabs" id="cat-tabs"></div>
  <div id="kit-body"></div>
</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

const KIT_KEY = 'invgen:kit';

const KIT_CATEGORIES = [
  { slug: 'camera',          label: 'Camera' },
  { slug: 'lenses',          label: 'Lenses' },
  { slug: 'filters',         label: 'Filters' },
  { slug: 'lighting',        label: 'Lighting' },
  { slug: 'light-modifiers', label: 'Light Modifiers' },
  { slug: 'audio',           label: 'Audio' },
  { slug: 'grip',            label: 'Grip & Support' },
  { slug: 'media',           label: 'Media' },
  { slug: 'other',           label: 'Other' },
];

const DEMO_KIT = {
  camera: [
    { name: 'Sony FX3',         rate: 150 },
    { name: 'BMPCC 6K Pro',     rate: 150 },
    { name: 'Fujifilm X-H2S',   rate: 100 },
    { name: 'Sony A7R II',      rate: 50  },
    { name: 'Lumix GH5S',       rate: 75  },
  ],
  lenses: [
    { name: 'Sony FE PZ 28-135mm f/4 G OSS',          rate: 75  },
    { name: 'Rokinon Cine DS Set (35/50/85mm T-Stop)', rate: 150 },
    { name: 'Rokinon 16mm f/2.0',                      rate: 25  },
    { name: 'Sigma 18-35mm f/1.8',                     rate: 45  },
    { name: 'Sigma 70-200mm f/2.8',                    rate: 55  },
    { name: 'DZO Prime Set',                           rate: 200 },
  ],
  filters: [
    { name: 'Tiffen ND Set 77mm',             rate: 20 },
    { name: 'Tiffen ND Set 82mm',             rate: 20 },
    { name: 'Tiffen 1/8 Black Pro Mist 77mm', rate: 15 },
    { name: 'Tiffen Polarizer 82mm',          rate: 15 },
    { name: 'Tiffen Split Diopter 72mm',      rate: 20 },
  ],
  lighting: [
    { name: 'Aputure 600C Pro',               rate: 150 },
    { name: 'Aputure 300X',                   rate: 100 },
    { name: 'Aputure 300D II',                rate: 95  },
    { name: 'Aputure Accent B7c 8-Light Kit', rate: 75  },
    { name: 'Aputure MC Pro 8-Light Kit',     rate: 60  },
    { name: 'Aputure MC 4-Light Travel Kit',  rate: 50  },
    { name: 'Aputure INFINIBAR PB3 (×4)',     rate: 60  },
    { name: 'COLBOR CL60R RGB',               rate: 35  },
    { name: 'GVM RGB 1×1 LED Panel',            rate: 30  },
    { name: 'Neewer Bi-Color 1×1 LED Panels',   rate: 25  },
    { name: 'Neewer AP150B 150W Bi-Color Panel', rate: 60  },
    { name: 'Neewer TL120C RGB Tube Light',      rate: 35  },
    { name: 'Neewer TL60 RGB Tube Light',        rate: 25  },
  ],
  'light-modifiers': [
    { name: 'Aputure Spotlight MaxKit + 19° Lens',      rate: 75 },
    { name: 'Aputure Spotlight Max Gobo Kit (10-piece)', rate: 50 },
    { name: 'Aputure Light Dome 150',                    rate: 45 },
    { name: 'Aputure Light Dome SE',                     rate: 20 },
    { name: 'Aputure Light Dome III',                    rate: 25 },
    { name: 'Aputure Light Box 60×90',                   rate: 30 },
    { name: 'Aputure Lantern 90in',                      rate: 20 },
    { name: 'Aputure Lantern 26in',                      rate: 15 },
    { name: 'Aputure INFINIBAR PB3 Grid (Eggcrate)',     rate: 15 },
    { name: 'Reflector Dishes',                          rate: 10 },
  ],
  audio: [
    { name: 'Wireless Lavalier Kit', rate: 50 },
    { name: 'Shotgun Mic + Boom',    rate: 75 },
  ],
  grip: [
    { name: 'SIRUI SVS75 Cinema Tripod',   rate: 40  },
    { name: 'Sirui Heavy Duty Tripod',     rate: 30  },
    { name: 'Manfrotto 502HD + 545B Legs', rate: 25  },
    { name: 'Manfrotto Shoulder Mount',    rate: 35  },
    { name: 'Ronin S2 Gimbal',             rate: 60  },
    { name: 'M7 Jib Head',                rate: 400 },
    { name: 'C-Stand',                    rate: 15  },
    { name: 'Large Light Bounce',         rate: 10  },
  ],
  media: [
    { name: '256GB SD Delkin',  rate: 90 },
    { name: '256GB SD Generic', rate: 28 },
  ],
  other: [
    { name: 'Cables & Expendables',    rate: 25 },
    { name: 'Gaff Tape (per roll)',    rate: 5  },
    { name: 'Power Distro / Stingers', rate: 20 },
  ],
};

// ── Storage ──
function getKit() {
  try {
    const raw = JSON.parse(localStorage.getItem(KIT_KEY) || '[]');
    return raw.map(k => ({ ...k, category: normalizeCategory(k.category) }));
  } catch { return []; }
}
function setKit(kit) {
  localStorage.setItem(KIT_KEY, JSON.stringify(kit));
}
function normalizeCategory(c) {
  if (!c) return 'other';
  const map = {
    'Camera':'camera','Cameras':'camera','Lenses':'lenses','Lens':'lenses',
    'Filters':'filters','Lighting':'lighting','Lights':'lighting',
    'Light Modifiers':'light-modifiers','Modifiers':'light-modifiers',
    'Audio':'audio','Grip & Support':'grip','Grip':'grip','Tripods':'grip',
    'Media':'media','Other':'other','Misc':'other',
  };
  if (map[c]) return map[c];
  const lc = c.toLowerCase();
  return KIT_CATEGORIES.some(cat => cat.slug === lc) ? lc : 'other';
}
function categoryLabel(slug) {
  return (KIT_CATEGORIES.find(c => c.slug === slug) || {}).label || 'Other';
}

// ── State ──
let kit = getKit();
let activeCat = 'all'; // 'all' or a slug
let saveTimer = null;

// If kit is completely empty, load demo kit silently
if (kit.length === 0) loadDemoKit(false);

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Auto-save (debounced) ──
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    setKit(kit);
    updateStats();
  }, 300);
}

function saveNow() {
  clearTimeout(saveTimer);
  setKit(kit);
  updateStats();
  showToast('✓ Kit saved');
}

// ── Stats ──
function updateStats() {
  const cats = new Set(kit.map(k => k.category)).size;
  document.getElementById('kit-stats').textContent = `${kit.length} item${kit.length !== 1 ? 's' : ''} · ${cats} categor${cats !== 1 ? 'ies' : 'y'}`;
}

// ── Category tabs ──
function renderTabs() {
  const container = document.getElementById('cat-tabs');
  container.innerHTML = '';

  const counts = {};
  for (const k of kit) counts[k.category] = (counts[k.category] || 0) + 1;

  // All tab
  const allTab = document.createElement('button');
  allTab.className = 'cat-tab' + (activeCat === 'all' ? ' active' : '');
  allTab.innerHTML = `All <span class="ct-count">${kit.length}</span>`;
  allTab.addEventListener('click', () => { activeCat = 'all'; render(); });
  container.appendChild(allTab);

  for (const cat of KIT_CATEGORIES) {
    if (!counts[cat.slug]) continue;
    const tab = document.createElement('button');
    tab.className = 'cat-tab' + (activeCat === cat.slug ? ' active' : '');
    tab.innerHTML = `${cat.label} <span class="ct-count">${counts[cat.slug]}</span>`;
    tab.addEventListener('click', () => { activeCat = cat.slug; render(); });
    container.appendChild(tab);
  }
}

// ── Main render ──
function render() {
  renderTabs();
  updateStats();

  const body = document.getElementById('kit-body');
  body.innerHTML = '';

  // Bulk loaders
  body.appendChild(buildBulkSection());

  if (kit.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <h2>Your kit is empty</h2>
      <p>Add items manually, bulk-load a category above, or load the full demo kit.</p>
      <button class="btn btn-primary" id="load-demo-btn">Load Demo Kit</button>
    `;
    body.appendChild(empty);
    document.getElementById('load-demo-btn').addEventListener('click', () => {
      loadDemoKit(true);
      render();
    });
    return;
  }

  // Determine which categories to show
  const catsToShow = activeCat === 'all'
    ? KIT_CATEGORIES.map(c => c.slug)
    : [activeCat];

  for (const slug of catsToShow) {
    const items = kit.map((k, i) => ({ ...k, _i: i })).filter(k => k.category === slug);
    if (items.length === 0) continue;

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.id = `cat-${slug}`;

    const head = document.createElement('div');
    head.className = 'cat-section-head';
    head.innerHTML = `<h3>${categoryLabel(slug)}</h3><span class="cat-count">${items.length} item${items.length !== 1 ? 's' : ''}</span>`;
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-sm add-to-cat-btn';
    addBtn.textContent = '+ Add';
    addBtn.addEventListener('click', () => addItem(slug));
    head.appendChild(addBtn);
    section.appendChild(head);

    const labels = document.createElement('div');
    labels.className = 'kit-col-labels';
    labels.innerHTML = '<span>Category</span><span>Item Name</span><span>Qty</span><span>Day Rate</span><span>Notes</span><span></span><span></span>';
    section.appendChild(labels);

    const list = document.createElement('div');
    list.className = 'kit-items';
    for (const item of items) {
      list.appendChild(buildRow(item._i));
    }
    section.appendChild(list);
    body.appendChild(section);
  }

  // Reset button at bottom
  const resetWrap = document.createElement('div');
  resetWrap.style.cssText = 'margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center;';
  resetWrap.innerHTML = '<span style="font-size:12px;color:var(--ink-muted);flex:1;">Need to start over?</span>';
  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn btn-sm btn-danger';
  resetBtn.textContent = 'Reset to Demo Kit';
  resetBtn.addEventListener('click', () => {
    if (!confirm('Replace your current kit with the demo kit? This will remove all your saved items.')) return;
    loadDemoKit(true);
    render();
    showToast('Demo kit loaded');
  });
  resetWrap.appendChild(resetBtn);
  body.appendChild(resetWrap);
}

// ── Build a single kit row ──
function buildRow(idx) {
  const k = kit[idx];
  const row = document.createElement('div');
  row.className = 'kit-row';

  const catSel = document.createElement('select');
  for (const cat of KIT_CATEGORIES) {
    const opt = document.createElement('option');
    opt.value = cat.slug;
    opt.textContent = cat.label;
    if (cat.slug === k.category) opt.selected = true;
    catSel.appendChild(opt);
  }
  catSel.addEventListener('change', () => {
    kit[idx].category = catSel.value;
    scheduleSave();
    render(); // re-render so item moves to correct category section
  });

  const nameIn = document.createElement('input');
  nameIn.type = 'text';
  nameIn.placeholder = 'Item name';
  nameIn.value = k.name || '';
  nameIn.addEventListener('input', () => { kit[idx].name = nameIn.value; scheduleSave(); });

  const qtyIn = document.createElement('input');
  qtyIn.type = 'number';
  qtyIn.placeholder = '1';
  qtyIn.min = '1';
  qtyIn.step = '1';
  qtyIn.value = k.qty != null ? k.qty : 1;
  qtyIn.addEventListener('input', () => { kit[idx].qty = parseFloat(qtyIn.value) || 1; scheduleSave(); });

  const rateIn = document.createElement('input');
  rateIn.type = 'number';
  rateIn.placeholder = '0';
  rateIn.className = 'rate-input';
  rateIn.value = k.rate != null ? k.rate : '';
  rateIn.addEventListener('input', () => { kit[idx].rate = parseFloat(rateIn.value) || 0; scheduleSave(); });

  const notesIn = document.createElement('input');
  notesIn.type = 'text';
  notesIn.placeholder = 'Notes';
  notesIn.value = k.notes || '';
  notesIn.addEventListener('input', () => { kit[idx].notes = notesIn.value; scheduleSave(); });

  const dupBtn = document.createElement('button');
  dupBtn.className = 'dup-btn';
  dupBtn.title = 'Duplicate';
  dupBtn.textContent = '⎘';
  dupBtn.addEventListener('click', () => {
    kit.splice(idx + 1, 0, { ...kit[idx], name: (kit[idx].name || '') + ' (copy)' });
    scheduleSave();
    render();
  });

  const rmBtn = document.createElement('button');
  rmBtn.className = 'rm-btn';
  rmBtn.title = 'Remove';
  rmBtn.textContent = '×';
  rmBtn.addEventListener('click', () => {
    const label = kit[idx].name || 'this item';
    if (!confirm(`Remove "${label}" from your kit?`)) return;
    kit.splice(idx, 1);
    scheduleSave();
    render();
  });

  row.append(catSel, nameIn, qtyIn, rateIn, notesIn, dupBtn, rmBtn);
  return row;
}

// ── Add item ──
function addItem(slug = 'other') {
  kit.push({ category: slug, name: '', rate: 0, notes: '' });
  activeCat = slug === 'other' && activeCat === 'all' ? 'all' : slug;
  scheduleSave();
  render();
  // Focus the new item's name input
  setTimeout(() => {
    const sec = document.getElementById(`cat-${slug}`);
    if (!sec) return;
    const inputs = sec.querySelectorAll('.kit-items .kit-row input[type="text"]');
    const last = inputs[inputs.length - 1];
    if (last) { last.focus(); last.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
  }, 60);
}

// ── Load demo kit ──
function loadDemoKit(merge) {
  if (merge) {
    // Add demo items that don't already exist (deduplicate by name, case-insensitive)
    const existing = new Set(kit.map(k => (k.name || '').toLowerCase().trim()));
    for (const [slug, items] of Object.entries(DEMO_KIT)) {
      for (const item of items) {
        const key = item.name.toLowerCase().trim();
        if (!existing.has(key)) {
          kit.push({ category: slug, name: item.name, rate: item.rate, notes: '' });
          existing.add(key);
        }
      }
    }
  } else {
    // First-load: set kit = demo items
    kit = [];
    for (const [slug, items] of Object.entries(DEMO_KIT)) {
      for (const item of items) {
        kit.push({ category: slug, name: item.name, rate: item.rate, notes: '' });
      }
    }
  }
  setKit(kit);
}

// ── Bulk loaders ──
function buildBulkSection() {
  const sec = document.createElement('div');
  sec.className = 'bulk-section';
  sec.innerHTML = '<div class="bulk-section-head">Add starter gear to your kit — click a category to add that group</div>';
  const btns = document.createElement('div');
  btns.className = 'bulk-btns';
  for (const cat of KIT_CATEGORIES) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.textContent = `+ ${cat.label}`;
    btn.addEventListener('click', () => bulkLoad(cat.slug));
    btns.appendChild(btn);
  }
  const loadAllBtn = document.createElement('button');
  loadAllBtn.className = 'btn btn-sm btn-primary';
  loadAllBtn.textContent = 'Load all categories';
  loadAllBtn.addEventListener('click', () => {
    loadDemoKit(true);
    render();
    showToast('All demo categories merged in');
  });
  btns.appendChild(loadAllBtn);
  sec.appendChild(btns);
  return sec;
}

function bulkLoad(slug) {
  const items = DEMO_KIT[slug] || [];
  const existing = new Set(kit.map(k => (k.name || '').toLowerCase().trim()));
  let added = 0;
  for (const item of items) {
    const key = item.name.toLowerCase().trim();
    if (existing.has(key)) continue;
    kit.push({ category: slug, name: item.name, rate: item.rate, notes: '' });
    existing.add(key);
    added++;
  }
  setKit(kit);
  activeCat = slug;
  render();
  showToast(added > 0 ? `Added ${added} ${categoryLabel(slug)} item${added !== 1 ? 's' : ''}` : `${categoryLabel(slug)} already loaded`);
}

// ── Wire up ──
document.getElementById('add-item-btn').addEventListener('click', () => addItem(activeCat === 'all' ? 'other' : activeCat));
document.getElementById('save-btn').addEventListener('click', saveNow);

// Initial render
render();
</script>
</body>
